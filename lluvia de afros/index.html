<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>Reveal.js + Lluvia de Stickmans</title>
    <link rel="stylesheet" href="https://unpkg.com/reveal.js/dist/reveal.css">
    <link rel="stylesheet" href="https://unpkg.com/reveal.js/dist/theme/white.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="afro-background"></div>
    <div class="reveal">
        <div class="slides">

            <section>
                <h2>Slide Intro</h2>
                <p>Pasa a la siguiente para ver la lluvia de stickmans con afro.</p>
            </section>

            <section id="afro-bg-slide">
                <h2>Lluvia de Stickmans</h2>
                <p>Los muñecos caen en loop infinito de fondo.</p>
            </section>

            <section>
                <h2>Otra Slide</h2>
                <p>Sin animación.</p>
            </section>

        </div>
    </div>

    <script src="https://unpkg.com/reveal.js/dist/reveal.js"></script>

    <script src="script.js"></script>
</body>

</html>
